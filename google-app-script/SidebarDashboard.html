<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        --bg: #f7f7f2;
        --card: #ffffff;
        --text: #1f2933;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-dark: #0b5f59;
        --border: #e5e7eb;
      }
      body {
        font-family: "Verdana", "Geneva", sans-serif;
        font-size: 13px;
        padding: 16px;
        color: var(--text);
        background: var(--bg);
      }
      h2 { margin: 0 0 12px 0; font-size: 16px; }
      .section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      }
      button {
        margin-top: 10px;
        padding: 8px 10px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: var(--accent-dark); }
      .status { margin-top: 8px; color: #0b6; }
      .error { margin-top: 8px; color: #b00; }
    </style>
  </head>
  <body>
    <h2>Dashboard en export</h2>

    <div class="section">
      <button onclick="rebuildDashboard()">Herbouw finance dashboard</button>
      <button onclick="exportDashboard()">Export finance dashboard (PDF)</button>
      <div id="dashboardMsg" class="status"></div>
    </div>

    <script>
      function setMsg(id, text, isError) {
        var el = document.getElementById(id);
        el.className = isError ? 'error' : 'status';
        el.textContent = text;
      }

      function rebuildDashboard() {
        google.script.run
          .withSuccessHandler(function() {
            setMsg('dashboardMsg', 'Dashboard herbouwd', false);
          })
          .withFailureHandler(function(err) {
            setMsg('dashboardMsg', err.message || err, true);
          })
          .rebuildFinanceDashboard();
      }

      function exportDashboard() {
        google.script.run
          .withSuccessHandler(function(res) {
            setMsg('dashboardMsg', 'PDF gemaakt: ' + res.fileName, false);
          })
          .withFailureHandler(function(err) {
            setMsg('dashboardMsg', err.message || err, true);
          })
          .exportFinanceDashboardPdf();
      }
    </script>
  </body>
</html>

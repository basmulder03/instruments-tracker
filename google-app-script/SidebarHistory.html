<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        --bg: #f7f7f2;
        --card: #ffffff;
        --text: #1f2933;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-dark: #0b5f59;
        --border: #e5e7eb;
      }
      body {
        font-family: "Verdana", "Geneva", sans-serif;
        font-size: 13px;
        padding: 16px;
        color: var(--text);
        background: var(--bg);
      }
      h2 { margin: 0 0 12px 0; font-size: 16px; }
      .section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      }
      label { display: block; margin-top: 8px; color: var(--muted); }
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 8px 10px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: var(--accent-dark); }
      .history {
        max-height: 220px;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        background: #fff;
      }
      .history-item { margin-bottom: 8px; font-size: 12px; color: var(--text); }
    </style>
  </head>
  <body>
    <h2>Historie bekijken</h2>

    <div class="section">
      <label>Instrument</label>
      <select id="historyInstrument"></select>
      <button onclick="loadHistory()">Laad historie</button>
      <div id="historyList" class="history"></div>
    </div>

    <script>
      function fillList(id, items) {
        var sel = document.getElementById(id);
        sel.innerHTML = '';
        (items || []).forEach(function(it) {
          var opt = document.createElement('option');
          opt.value = it.id;
          opt.textContent = it.name ? it.name : it.id;
          sel.appendChild(opt);
        });
      }

      function refreshLists() {
        google.script.run
          .withSuccessHandler(function(data) {
            fillList('historyInstrument', data.instruments);
          })
          .withFailureHandler(function(err) {
            alert(err.message || err);
          })
          .getMasterData();
      }

      function loadHistory() {
        var instrumentId = document.getElementById('historyInstrument').value;
        google.script.run
          .withSuccessHandler(function(res) {
            var container = document.getElementById('historyList');
            container.innerHTML = '';
            if (!res || !res.ok) {
              container.textContent = (res && res.error) || 'Geen data';
              return;
            }
            res.items.forEach(function(item) {
              var div = document.createElement('div');
              div.className = 'history-item';
              div.textContent = item.type + ' - ' + (item.date || '') + ' - ' + JSON.stringify(item.data);
              container.appendChild(div);
            });
          })
          .withFailureHandler(function(err) {
            document.getElementById('historyList').textContent = err.message || err;
          })
          .getInstrumentHistory(instrumentId);
      }

      refreshLists();
    </script>
  </body>
</html>

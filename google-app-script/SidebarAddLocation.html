<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        --bg: #f7f7f2;
        --card: #ffffff;
        --text: #1f2933;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-dark: #0b5f59;
        --border: #e5e7eb;
      }
      body {
        font-family: "Verdana", "Geneva", sans-serif;
        font-size: 13px;
        padding: 16px;
        color: var(--text);
        background: var(--bg);
      }
      h2 { margin: 0 0 12px 0; font-size: 16px; }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      }
      .section-title { font-weight: 700; margin-bottom: 8px; }
      label { display: block; margin-top: 8px; color: var(--muted); }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 8px 10px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: var(--accent-dark); }
      .status { margin-top: 8px; color: #0b6; }
      .error { margin-top: 8px; color: #b00; }
    </style>
  </head>
  <body>
    <h2>Locatie toevoegen</h2>

    <div class="card">
      <div class="section-title">Gegevens</div>
      <label>Naam</label>
      <input id="locationName" />
      <label>Adres</label>
      <input id="locationAddress" />
      <label>Notities</label>
      <textarea id="locationNotes"></textarea>
      <button onclick="addLocation()">Opslaan</button>
      <div id="locationMsg" class="status"></div>
    </div>

    <script>
      function setMsg(id, text, isError) {
        var el = document.getElementById(id);
        el.className = isError ? 'error' : 'status';
        el.textContent = text;
      }

      function addLocation() {
        var payload = {
          Naam: document.getElementById('locationName').value.trim(),
          Adres: document.getElementById('locationAddress').value.trim(),
          Notes: document.getElementById('locationNotes').value.trim()
        };
        google.script.run
          .withSuccessHandler(function() {
            setMsg('locationMsg', 'Opgeslagen (ID automatisch)', false);
          })
          .withFailureHandler(function(err) {
            setMsg('locationMsg', err.message || err, true);
          })
          .addLocation(payload);
      }
    </script>
  </body>
</html>

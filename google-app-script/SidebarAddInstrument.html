<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        --bg: #f7f7f2;
        --card: #ffffff;
        --text: #1f2933;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-dark: #0b5f59;
        --border: #e5e7eb;
      }
      body {
        font-family: "Verdana", "Geneva", sans-serif;
        font-size: 13px;
        padding: 16px;
        color: var(--text);
        background: var(--bg);
      }
      h2 { margin: 0 0 12px 0; font-size: 16px; }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      }
      .section-title { font-weight: 700; margin-bottom: 8px; }
      label { display: block; margin-top: 8px; color: var(--muted); }
      input, textarea, select {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 8px 10px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: var(--accent-dark); }
      .status { margin-top: 8px; color: #0b6; }
      .error { margin-top: 8px; color: #b00; }
    </style>
  </head>
  <body>
    <h2>Instrument toevoegen</h2>

    <div class="card">
      <div class="section-title">Gegevens</div>
      <label>Naam</label>
      <input id="instrumentName" />
      <label>Type</label>
      <input id="instrumentType" />
      <label>Merk</label>
      <input id="instrumentBrand" />
      <label>Serienummer</label>
      <input id="instrumentSerial" />
      <label>Aankoopdatum</label>
      <input id="instrumentPurchaseDate" placeholder="YYYY-MM-DD" />
      <label>Aankoopkosten</label>
      <input id="instrumentPurchaseCost" />
      <label>Levensduur (jaren)</label>
      <input id="instrumentUsefulLife" />
      <label>Salvage waarde</label>
      <input id="instrumentSalvage" />
      <label>Huidige locatie</label>
      <select id="instrumentLocationId"></select>
      <label>Notities</label>
      <textarea id="instrumentNotes"></textarea>
      <button onclick="addInstrument()">Opslaan</button>
      <div id="instrumentMsg" class="status"></div>
    </div>

    <script>
      function setMsg(id, text, isError) {
        var el = document.getElementById(id);
        el.className = isError ? 'error' : 'status';
        el.textContent = text;
      }

      function fillList(id, items) {
        var sel = document.getElementById(id);
        sel.innerHTML = '<option value="">Selecteer</option>';
        (items || []).forEach(function(it) {
          var opt = document.createElement('option');
          opt.value = it.id;
          opt.textContent = it.name ? it.name : it.id;
          sel.appendChild(opt);
        });
      }

      function refreshLocations() {
        google.script.run
          .withSuccessHandler(function(data) {
            fillList('instrumentLocationId', data.locations);
          })
          .withFailureHandler(function(err) {
            alert(err.message || err);
          })
          .getMasterData();
      }

      function addInstrument() {
        var payload = {
          Naam: document.getElementById('instrumentName').value.trim(),
          Type: document.getElementById('instrumentType').value.trim(),
          Merk: document.getElementById('instrumentBrand').value.trim(),
          Serienummer: document.getElementById('instrumentSerial').value.trim(),
          PurchaseDate: document.getElementById('instrumentPurchaseDate').value.trim(),
          PurchaseCost: document.getElementById('instrumentPurchaseCost').value.trim(),
          UsefulLifeYears: document.getElementById('instrumentUsefulLife').value.trim(),
          SalvageValue: document.getElementById('instrumentSalvage').value.trim(),
          CurrentLocationId: document.getElementById('instrumentLocationId').value,
          Notes: document.getElementById('instrumentNotes').value.trim()
        };
        google.script.run
          .withSuccessHandler(function(res) {
            setMsg('instrumentMsg', 'Opgeslagen (ID automatisch)', false);
            refreshLocations();
          })
          .withFailureHandler(function(err) {
            setMsg('instrumentMsg', err.message || err, true);
          })
          .addInstrument(payload);
      }

      refreshLocations();
    </script>
  </body>
</html>

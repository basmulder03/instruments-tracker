<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        --bg: #f7f7f2;
        --card: #ffffff;
        --text: #1f2933;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-dark: #0b5f59;
        --border: #e5e7eb;
      }
      body {
        font-family: "Verdana", "Geneva", sans-serif;
        font-size: 13px;
        padding: 16px;
        color: var(--text);
        background: var(--bg);
      }
      h2 { margin: 0 0 12px 0; font-size: 16px; }
      .section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      }
      label { display: block; margin-top: 8px; color: var(--muted); }
      input, select, textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 8px 10px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: var(--accent-dark); }
      .status { margin-top: 8px; color: #0b6; }
      .error { margin-top: 8px; color: #b00; }
    </style>
  </head>
  <body>
    <h2>Checkout instrument</h2>

    <div class="section">
      <label>Instrument</label>
      <select id="checkoutInstrument"></select>
      <label>Persoon</label>
      <select id="checkoutPerson"></select>
      <label>Locatie (optioneel)</label>
      <select id="checkoutLocation"></select>
      <label>Notities</label>
      <textarea id="checkoutNotes"></textarea>
      <button onclick="checkout()">Checkout</button>
      <div id="checkoutMsg" class="status"></div>
    </div>

    <script>
      function setMsg(id, text, isError) {
        var el = document.getElementById(id);
        el.className = isError ? 'error' : 'status';
        el.textContent = text;
      }

      function fillList(id, items) {
        var sel = document.getElementById(id);
        sel.innerHTML = '';
        (items || []).forEach(function(it) {
          var opt = document.createElement('option');
          opt.value = it.id;
          opt.textContent = it.name ? it.name : it.id;
          sel.appendChild(opt);
        });
      }

      function refreshLists() {
        google.script.run
          .withSuccessHandler(function(data) {
            fillList('checkoutInstrument', data.instruments);
            fillList('checkoutPerson', data.people);
            fillList('checkoutLocation', data.locations);
          })
          .withFailureHandler(function(err) {
            alert(err.message || err);
          })
          .getMasterData();
      }

      function checkout() {
        var payload = {
          InstrumentId: document.getElementById('checkoutInstrument').value,
          PersonId: document.getElementById('checkoutPerson').value,
          LocationId: document.getElementById('checkoutLocation').value,
          Notes: document.getElementById('checkoutNotes').value
        };
        google.script.run
          .withSuccessHandler(function() {
            setMsg('checkoutMsg', 'Checkout opgeslagen', false);
            refreshLists();
          })
          .withFailureHandler(function(err) {
            setMsg('checkoutMsg', err.message || err, true);
          })
          .checkoutInstrument(payload);
      }

      refreshLists();
    </script>
  </body>
</html>
